<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngoc-Phuc Nguyen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen p-4 md:p-8 flex items-center justify-center" onclick="handleGlobalClick(event)">

    <div class="max-w-md w-full space-y-8">
        
        <div class="bg-white shadow-lg rounded-xl p-8 text-center">
            <img src="https://media.licdn.com/dms/image/v2/C5603AQECgQuhETEviA/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1638780680788?e=2147483647&v=beta&t=0QFookU7YTftb4FgYECUWs3_wLVXP8Z-0YVV2CNyo5o" 
                 alt="Ngoc-Phuc Nguyen" 
                 class="w-32 h-32 rounded-full mx-auto mb-6 border-4 border-gray-100 shadow-md object-cover">

            <h1 class="text-3xl font-bold text-gray-900">Ngoc-Phuc Nguyen</h1>
            <p class="text-lg text-blue-600 font-medium mt-2">Ausbildner Applikationsentwicklung</p>
            <p class="text-gray-600 mt-1">Noser Young</p>

            <div class="mt-8 flex justify-center">
                <a href="https://ch.linkedin.com/in/ngoc-phuc-nguyen-54a645201" 
                   class="inline-block bg-gray-900 text-white px-6 py-2 rounded-lg hover:bg-gray-700 transition">
                   LinkedIn Profil
                </a>
            </div>
        </div>
    </div>

    <div id="jumpscare-overlay" 
         class="fixed inset-0 z-50 bg-black flex items-center justify-center hidden cursor-pointer" 
         onclick="closeJumpscare(event)">
        <img src="img/gugi.jpg" class="max-h-screen max-w-full p-4">
    </div>

    <script>
        // Zentrale Funktion zum Anzeigen des Bildes
        function showJumpscare() {
            document.getElementById('jumpscare-overlay').classList.remove('hidden');
        }

        // Timer: Nach 5000ms (5 Sekunden) ausführen
        setTimeout(showJumpscare, 5000);

        // Manuelles Auslösen bei Klick überall (außer auf Link)
        function handleGlobalClick(event) {
            if (event.target.closest('a')) return;
            showJumpscare();
        }

        // Schließen bei Klick auf das Bild
        function closeJumpscare(event) {
            event.stopPropagation();
            document.getElementById('jumpscare-overlay').classList.add('hidden');
        }
    </script>

</body>
</html>
